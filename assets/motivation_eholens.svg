<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <rect width="500" height="500" fill="#ffffff"/>
  <defs>
    <clipPath id="c"><circle cx="250" cy="250" r="238"/></clipPath>
    <path id="arc" d="M250,14 a236,236 0 1,1 -0.1,0"/>
  </defs>
  <circle cx="250" cy="250" r="238" fill="#fafafa" stroke="#eeeeee" stroke-width="1.5"/>
  <g clip-path="url(#c)">
    <!-- Watermark -->
    <text x="250" y="285" text-anchor="middle" font-family="Georgia,serif" font-size="84" fill="#f0f0f0" font-weight="bold" letter-spacing="-2">TRAINING</text>
    <!-- Hero -->
    <text x="250" y="235" text-anchor="middle" font-family="Georgia,serif" font-size="34" fill="#cc0000" font-weight="bold" transform="rotate(-3,250,235)">does it transfer?</text>
    <!-- Impact words (red) -->
    <text x="250" y="120" text-anchor="middle" font-family="Georgia,serif" font-size="30" fill="#cc0000" font-weight="bold" transform="rotate(-6,250,120)">programmable</text>
    <text x="382" y="180" text-anchor="middle" font-family="Georgia,serif" font-size="28" fill="#cc0000" transform="rotate(10,382,180)">safe</text>
    <text x="372" y="326" text-anchor="middle" font-family="Georgia,serif" font-size="22" fill="#cc0000" transform="rotate(-9,372,326)">scalable</text>
    <text x="250" y="400" text-anchor="middle" font-family="Georgia,serif" font-size="24" fill="#cc0000" transform="rotate(3,250,400)">rehabilitation</text>
    <text x="128" y="326" text-anchor="middle" font-family="Georgia,serif" font-size="20" fill="#cc0000" transform="rotate(9,128,326)">AR obstacles</text>
    <text x="118" y="180" text-anchor="middle" font-family="Georgia,serif" font-size="20" fill="#cc0000" transform="rotate(-12,118,180)">HoloLens</text>
    <!-- Support words (gray) -->
    <text x="250" y="62" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="#777">obstacle avoidance</text>
    <text x="432" y="255" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#888" transform="rotate(88,432,255)">physical</text>
    <text x="68" y="255" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#888" transform="rotate(-88,68,255)">clinical</text>
    <text x="250" y="450" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#777">gait · mobility · balance</text>
    <text x="396" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#bbb" transform="rotate(28,396,120)">risky</text>
    <text x="104" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#bbb" transform="rotate(-28,104,120)">limited</text>
    <text x="396" y="385" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#aaa" transform="rotate(-25,396,385)">mixed reality</text>
    <text x="104" y="385" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#aaa" transform="rotate(25,104,385)">inflexible</text>
  </g>
  <text font-family="Arial,sans-serif" font-size="10" fill="#cccccc" letter-spacing="3">
    <textPath href="#arc">BMES 2018  ·  HOLOLENS  ·  VICON MOTION CAPTURE  ·  MIXED REALITY  ·  AMPUTEE  ·  STROKE  ·  OBSTACLE TRAINING  ·</textPath>
  </text>
</svg>
