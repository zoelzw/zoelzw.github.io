<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <rect width="500" height="500" fill="#fff"/>
  <defs>
    <clipPath id="c"><circle cx="250" cy="250" r="236"/></clipPath>
    <path id="arc" d="M250,15 a235,235 0 1,1 -0.1,0"/>
  </defs>
  <circle cx="250" cy="250" r="236" fill="#fff" stroke="#eee" stroke-width="1"/>
  <g clip-path="url(#c)" font-family="Arial, sans-serif">

    <!-- row y=52 -->
    <text x="152" y="52" text-anchor="middle" font-size="10" fill="#ddd">touch</text>
    <text x="210" y="52" text-anchor="middle" font-size="10" fill="#ddd">vibration</text>
    <text x="273" y="52" text-anchor="middle" font-size="10" fill="#ddd">pressure</text>
    <text x="332" y="52" text-anchor="middle" font-size="10" fill="#ddd">haptic</text>
    <!-- row y=66 -->
    <text x="110" y="66" text-anchor="middle" font-size="10" fill="#ccc">chemical</text>
    <text x="182" y="66" text-anchor="middle" font-size="10" fill="#ccc">skin</text>
    <text x="248" y="66" text-anchor="middle" font-size="10" fill="#ccc">receptor</text>
    <text x="310" y="66" text-anchor="middle" font-size="10" fill="#ccc">nerve</text>
    <text x="375" y="66" text-anchor="middle" font-size="10" fill="#ccc">actuator</text>
    <!-- row y=82 -->
    <text x="82" y="82" text-anchor="middle" font-size="11" fill="#bbb">vibration</text>
    <text x="168" y="82" text-anchor="middle" font-size="11" fill="#bbb">touch</text>
    <text x="252" y="82" text-anchor="middle" font-size="11" fill="#bbb">compound</text>
    <text x="340" y="82" text-anchor="middle" font-size="11" fill="#bbb">liquid</text>
    <text x="410" y="82" text-anchor="middle" font-size="11" fill="#bbb">signal</text>
    <!-- row y=100 -->
    <text x="68" y="100" text-anchor="middle" font-size="13" fill="#aaa" transform="rotate(-4,68,100)">stimulant</text>
    <text x="185" y="100" text-anchor="middle" font-size="13" fill="#aaa">patch</text>
    <text x="255" y="100" text-anchor="middle" font-size="13" fill="#aaa">pump</text>
    <text x="322" y="100" text-anchor="middle" font-size="13" fill="#aaa">silicone</text>
    <text x="420" y="100" text-anchor="middle" font-size="11" fill="#bbb">device</text>
    <!-- row y=120 -->
    <text x="52" y="120" text-anchor="middle" font-size="12" fill="#aaa" transform="rotate(-6,52,120)">actuation</text>
    <text x="162" y="120" text-anchor="middle" font-size="14" fill="#888">mechanical</text>
    <text x="280" y="120" text-anchor="middle" font-size="14" fill="#888">wearable</text>
    <text x="390" y="120" text-anchor="middle" font-size="12" fill="#aaa" transform="rotate(5,390,120)">interface</text>
    <text x="450" y="120" text-anchor="middle" font-size="11" fill="#bbb">haptic</text>
    <!-- row y=142 -->
    <text x="40" y="142" text-anchor="middle" font-size="13" fill="#aaa" transform="rotate(-8,40,142)">touch</text>
    <text x="148" y="142" text-anchor="middle" font-size="16" fill="#666">thermoreceptors</text>
    <text x="320" y="142" text-anchor="middle" font-size="15" fill="#666">nociceptors</text>
    <text x="435" y="142" text-anchor="middle" font-size="11" fill="#bbb" transform="rotate(6,435,142)">signal</text>
    <!-- row y=162 -->
    <text x="30" y="162" text-anchor="middle" font-size="11" fill="#bbb" transform="rotate(-10,30,162)">nerve</text>
    <text x="152" y="162" text-anchor="middle" font-size="16" fill="#555">skin receptors</text>
    <text x="340" y="162" text-anchor="middle" font-size="15" fill="#666">topical stimulants</text>
    <text x="460" y="162" text-anchor="middle" font-size="10" fill="#bbb" transform="rotate(8,460,162)">compound</text>

    <!-- KEY: warmth + cold -->
    <text x="158" y="196" text-anchor="middle" font-family="Georgia,serif" font-size="32" fill="#cc0000" font-weight="bold" transform="rotate(-5,158,196)">warmth</text>
    <text x="388" y="192" text-anchor="middle" font-family="Georgia,serif" font-size="27" fill="#cc0000" font-weight="bold" transform="rotate(6,388,192)">cold</text>

    <!-- row y=220 between warmth and chemistry -->
    <text x="22" y="222" text-anchor="middle" font-size="12" fill="#bbb" transform="rotate(-90,22,222)">pressure</text>
    <text x="168" y="222" text-anchor="middle" font-size="14" fill="#888">vibration</text>
    <text x="280" y="222" text-anchor="middle" font-size="14" fill="#888">chemical</text>
    <text x="380" y="222" text-anchor="middle" font-size="13" fill="#aaa">receptor</text>
    <text x="462" y="222" text-anchor="middle" font-size="10" fill="#ccc" transform="rotate(90,462,222)">touch</text>

    <!-- KEY: chemistry -->
    <text x="250" y="262" text-anchor="middle" font-family="Georgia,serif" font-size="44" fill="#cc0000" font-weight="bold" transform="rotate(-2,250,262)">chemistry</text>

    <!-- row y=288 below chemistry -->
    <text x="22" y="288" text-anchor="middle" font-size="10" fill="#ccc" transform="rotate(-90,22,288)">haptic</text>
    <text x="140" y="290" text-anchor="middle" font-size="14" fill="#888">sensation</text>
    <text x="262" y="290" text-anchor="middle" font-size="15" fill="#555" font-style="italic">skin</text>
    <text x="355" y="290" text-anchor="middle" font-size="13" fill="#aaa">wearable</text>
    <text x="462" y="288" text-anchor="middle" font-size="10" fill="#ccc" transform="rotate(90,462,288)">nerve</text>

    <!-- KEY: tingling + stinging -->
    <text x="138" y="328" text-anchor="middle" font-family="Georgia,serif" font-size="24" fill="#cc0000" font-weight="bold" transform="rotate(8,138,328)">tingling</text>
    <text x="388" y="328" text-anchor="middle" font-family="Georgia,serif" font-size="21" fill="#cc0000" transform="rotate(-7,388,328)">stinging</text>

    <!-- row y=352 -->
    <text x="28" y="355" text-anchor="middle" font-size="11" fill="#bbb" transform="rotate(-10,28,355)">signal</text>
    <text x="145" y="355" text-anchor="middle" font-size="13" fill="#aaa">nociceptors</text>
    <text x="256" y="355" text-anchor="middle" font-size="14" fill="#888">topical</text>
    <text x="360" y="355" text-anchor="middle" font-size="13" fill="#aaa">thermoreceptors</text>
    <text x="462" y="355" text-anchor="middle" font-size="11" fill="#bbb" transform="rotate(8,462,355)">compound</text>

    <!-- KEY: numbing -->
    <text x="250" y="390" text-anchor="middle" font-family="Georgia,serif" font-size="28" fill="#cc0000" font-weight="bold" transform="rotate(3,250,390)">numbing</text>

    <!-- row y=415 -->
    <text x="72" y="415" text-anchor="middle" font-size="13" fill="#aaa" transform="rotate(-8,72,415)">patch</text>
    <text x="162" y="415" text-anchor="middle" font-size="13" fill="#aaa">pump</text>
    <text x="250" y="415" text-anchor="middle" font-size="13" fill="#aaa">silicone</text>
    <text x="338" y="415" text-anchor="middle" font-size="13" fill="#aaa">receptor</text>
    <text x="422" y="415" text-anchor="middle" font-size="12" fill="#bbb" transform="rotate(7,422,415)">actuator</text>
    <!-- row y=433 -->
    <text x="110" y="433" text-anchor="middle" font-size="11" fill="#bbb" transform="rotate(-5,110,433)">mechanical</text>
    <text x="212" y="433" text-anchor="middle" font-size="11" fill="#bbb">interface</text>
    <text x="295" y="433" text-anchor="middle" font-size="11" fill="#bbb">device</text>
    <text x="380" y="433" text-anchor="middle" font-size="11" fill="#bbb" transform="rotate(5,380,433)">liquid</text>
    <!-- row y=450 -->
    <text x="152" y="450" text-anchor="middle" font-size="10" fill="#ccc" transform="rotate(-4,152,450)">vibration</text>
    <text x="252" y="450" text-anchor="middle" font-size="10" fill="#ccc">touch</text>
    <text x="346" y="450" text-anchor="middle" font-size="10" fill="#ccc" transform="rotate(4,346,450)">pressure</text>
  </g>
  <text font-family="Arial,sans-serif" font-size="10" fill="#cccccc" letter-spacing="3">
    <textPath href="#arc">UIST 2021  ·  WEARABLE  ·  MICROPUMP  ·  SANSHOOL  ·  LIDOCAINE  ·  CAPSAICIN  ·  MENTHOL  ·</textPath>
  </text>
</svg>
