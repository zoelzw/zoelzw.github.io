<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <rect width="600" height="300" fill="#fafafa"/>

  <!-- Hero phrase -->
  <text x="300" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="40" fill="#1a1a1a" font-weight="bold" letter-spacing="-1">SKIN DEEP</text>

  <!-- Motivating question -->
  <text x="300" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#cc0000" font-style="italic">Can we trigger chemically-sensitive receptors directly — beyond mechanical limits?</text>

  <line x1="160" y1="90" x2="440" y2="90" stroke="#e8e8e8" stroke-width="1"/>

  <!-- Left cluster: existing approach (gray, fading) -->
  <text x="95" y="133" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#cccccc" font-weight="bold">mechanical</text>
  <text x="78" y="160" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#d8d8d8">vibration</text>
  <text x="112" y="184" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#ddd">touch</text>
  <text x="82" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e2e2e2">pressure</text>
  <text x="108" y="227" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e8e8e8">mechanoreceptors</text>

  <!-- Center bridge -->
  <text x="300" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#bbbbbb" font-style="italic">→  topical stimulants  →</text>

  <!-- Right cluster: new sensations unlocked (red) -->
  <text x="492" y="128" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#cc0000" font-weight="bold">warmth</text>
  <text x="524" y="155" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#cc0000">cold</text>
  <text x="478" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="19" fill="#cc0000">tingling</text>
  <text x="516" y="203" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#dd4444">stinging</text>
  <text x="484" y="225" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#dd4444">numbing</text>

  <line x1="30" y1="250" x2="570" y2="250" stroke="#eeeeee" stroke-width="1"/>
  <text x="300" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#cccccc" letter-spacing="2">WEARABLE  ·  MICROPUMP  ·  SKIN CHEMISTRY  ·  UIST 2021</text>
</svg>
