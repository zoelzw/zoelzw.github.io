<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" font-family="Arial, sans-serif">
  <rect x="1" y="1" width="598" height="298" rx="8" fill="#fff" stroke="#e8e8e8" stroke-width="1.5"/>

  <!-- Theme tag -->
  <rect x="20" y="18" width="160" height="22" rx="11" fill="#cc0000"/>
  <text x="100" y="33" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold" letter-spacing="0.8">ASSISTIVE TECHNOLOGY</text>

  <!-- Central question (two lines) -->
  <rect x="60" y="52" width="480" height="52" rx="6" fill="#fff8f8" stroke="#cc0000" stroke-width="1.5"/>
  <text x="300" y="73" text-anchor="middle" font-size="13" fill="#cc0000" font-style="italic">Where do amputees look when approaching stairs?</text>
  <text x="300" y="94" text-anchor="middle" font-size="12" fill="#cc0000" font-style="italic">How can gaze patterns improve robotic prosthetic control?</text>

  <!-- Divider -->
  <line x1="60" y1="120" x2="540" y2="120" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Left branch: context -->
  <line x1="300" y1="120" x2="170" y2="144" stroke="#ddd" stroke-width="1.5"/>
  <rect x="60" y="144" width="220" height="32" rx="5" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <text x="170" y="164" text-anchor="middle" font-size="12" fill="#555">visual system guides gait</text>

  <line x1="170" y1="176" x2="170" y2="194" stroke="#ddd" stroke-width="1.5"/>
  <polygon points="165,191 175,191 170,198" fill="#ddd"/>
  <rect x="80" y="198" width="180" height="28" rx="4" fill="#f0f0f0" stroke="#ddd" stroke-width="1"/>
  <text x="170" y="216" text-anchor="middle" font-size="11" fill="#777">foot placement · spatial map</text>

  <text x="170" y="250" text-anchor="middle" font-size="10" fill="#bbb">terrain navigation  ·  perturbation response</text>

  <!-- Right branch: insight + opportunity -->
  <line x1="300" y1="120" x2="430" y2="144" stroke="#cc0000" stroke-width="1.5" opacity="0.4"/>
  <rect x="320" y="144" width="220" height="32" rx="5" fill="#fff0f0" stroke="#cc0000" stroke-width="1.5"/>
  <text x="430" y="164" text-anchor="middle" font-size="12" fill="#cc0000" font-weight="bold">amputees ≠ able-bodied</text>

  <line x1="430" y1="176" x2="430" y2="194" stroke="#cc0000" stroke-width="1.5" opacity="0.5"/>
  <polygon points="425,191 435,191 430,198" fill="#cc0000" opacity="0.5"/>
  <rect x="340" y="198" width="180" height="28" rx="4" fill="#fff0f0" stroke="#ffcdd2" stroke-width="1"/>
  <text x="430" y="216" text-anchor="middle" font-size="11" fill="#cc0000">earlier · closer · more dependent</text>

  <text x="430" y="250" text-anchor="middle" font-size="10" fill="#cc0000">gaze → locomotion prediction → better control</text>

  <!-- Footer -->
  <line x1="20" y1="268" x2="580" y2="268" stroke="#f5f5f5" stroke-width="1"/>
  <text x="300" y="286" text-anchor="middle" font-size="10" fill="#ccc" font-style="italic">IEEE EMBC 2019  ·  eye tracking glasses  ·  transtibial amputees  ·  stair transition</text>
</svg>
