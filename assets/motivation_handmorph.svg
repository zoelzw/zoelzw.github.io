<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" font-family="Arial, sans-serif">
  <rect x="1" y="1" width="598" height="298" rx="8" fill="#fff" stroke="#e8e8e8" stroke-width="1.5"/>

  <!-- Theme tag -->
  <rect x="20" y="18" width="168" height="22" rx="11" fill="#cc0000"/>
  <text x="104" y="33" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold" letter-spacing="0.8">EMBODIED INTERACTION</text>

  <!-- Central question -->
  <rect x="60" y="52" width="480" height="40" rx="6" fill="#fff8f8" stroke="#cc0000" stroke-width="1.5"/>
  <text x="300" y="77" text-anchor="middle" font-size="13" fill="#cc0000" font-style="italic">Can we experience a smaller hand in the real physical world?</text>

  <!-- Divider -->
  <line x1="60" y1="108" x2="540" y2="108" stroke="#f0f0f0" stroke-width="1"/>

  <!-- Left branch: existing VR approach -->
  <line x1="300" y1="108" x2="170" y2="132" stroke="#ddd" stroke-width="1.5"/>
  <rect x="60" y="132" width="220" height="32" rx="5" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
  <text x="170" y="152" text-anchor="middle" font-size="12" fill="#555">VR size illusions</text>

  <line x1="170" y1="164" x2="170" y2="182" stroke="#ddd" stroke-width="1.5"/>
  <polygon points="165,179 175,179 170,186" fill="#ddd"/>
  <rect x="80" y="186" width="180" height="28" rx="4" fill="#f0f0f0" stroke="#ddd" stroke-width="1"/>
  <text x="170" y="204" text-anchor="middle" font-size="11" fill="#777">virtual only · no real contact</text>

  <text x="170" y="238" text-anchor="middle" font-size="10" fill="#bbb">embodied cognition  ·  body ownership</text>

  <!-- VS -->
  <text x="300" y="200" text-anchor="middle" font-size="16" fill="#e8e8e8" font-weight="bold">vs</text>

  <!-- Right branch: HandMorph -->
  <line x1="300" y1="108" x2="430" y2="132" stroke="#cc0000" stroke-width="1.5" opacity="0.4"/>
  <rect x="320" y="132" width="220" height="32" rx="5" fill="#fff0f0" stroke="#cc0000" stroke-width="1.5"/>
  <text x="430" y="152" text-anchor="middle" font-size="12" fill="#cc0000" font-weight="bold">passive exoskeleton</text>

  <line x1="430" y1="164" x2="430" y2="182" stroke="#cc0000" stroke-width="1.5" opacity="0.5"/>
  <polygon points="425,179 435,179 430,186" fill="#cc0000" opacity="0.5"/>
  <rect x="340" y="186" width="180" height="28" rx="4" fill="#fff0f0" stroke="#ffcdd2" stroke-width="1"/>
  <text x="430" y="204" text-anchor="middle" font-size="11" fill="#cc0000">miniaturized grasp · real-world</text>

  <text x="430" y="238" text-anchor="middle" font-size="10" fill="#cc0000">empathy · design for children · physical context</text>

  <!-- Footer -->
  <line x1="20" y1="260" x2="580" y2="260" stroke="#f5f5f5" stroke-width="1"/>
  <text x="300" y="280" text-anchor="middle" font-size="10" fill="#ccc" font-style="italic">UIST 2020 Best Paper  ·  wearable  ·  size illusion  ·  body ownership  ·  empathy</text>
</svg>
