<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <rect width="600" height="300" fill="#fafafa"/>

  <!-- Hero phrase -->
  <text x="300" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="40" fill="#1a1a1a" font-weight="bold" letter-spacing="-1">FEEL SMALLER</text>

  <!-- Motivating question -->
  <text x="300" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#cc0000" font-style="italic">Can we embody a different body size in the real physical world?</text>

  <line x1="160" y1="90" x2="440" y2="90" stroke="#e8e8e8" stroke-width="1"/>

  <!-- Left cluster: VR approach (gray) -->
  <text x="95" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#cccccc" font-weight="bold">virtual reality</text>
  <text x="80" y="158" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#d8d8d8">size illusion</text>
  <text x="110" y="183" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#ddd">VR only</text>
  <text x="84" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#e2e2e2">no real contact</text>
  <text x="108" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e8e8e8">disembodied</text>

  <!-- Center bridge -->
  <text x="300" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#bbbbbb" font-style="italic">passive exoskeleton</text>
  <text x="300" y="179" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#bbbbbb" font-style="italic">miniaturized grasp</text>

  <!-- Right cluster: HandMorph impact (red) -->
  <text x="490" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#cc0000" font-weight="bold">real world</text>
  <text x="508" y="152" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#cc0000">empathy</text>
  <text x="476" y="177" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#cc0000">physical context</text>
  <text x="510" y="201" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#dd4444">design for children</text>
  <text x="484" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#dd4444">body ownership preserved</text>

  <line x1="30" y1="250" x2="570" y2="250" stroke="#eeeeee" stroke-width="1"/>
  <text x="300" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#cccccc" letter-spacing="2">EMBODIMENT  ·  WEARABLE  ·  EXOSKELETON  ·  UIST 2020 BEST PAPER</text>
</svg>
