<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <rect width="500" height="500" fill="#ffffff"/>
  <defs>
    <clipPath id="c"><circle cx="250" cy="250" r="238"/></clipPath>
    <path id="arc" d="M250,14 a236,236 0 1,1 -0.1,0"/>
  </defs>
  <circle cx="250" cy="250" r="238" fill="#fafafa" stroke="#eeeeee" stroke-width="1.5"/>
  <g clip-path="url(#c)">
    <!-- Watermark -->
    <text x="250" y="284" text-anchor="middle" font-family="Georgia,serif" font-size="80" fill="#f0f0f0" font-weight="bold" letter-spacing="-2">EMPATHY</text>
    <!-- Hero -->
    <text x="250" y="232" text-anchor="middle" font-family="Georgia,serif" font-size="36" fill="#cc0000" font-weight="bold" transform="rotate(-4,250,232)">feel smaller</text>
    <!-- Impact words (red) -->
    <text x="250" y="118" text-anchor="middle" font-family="Georgia,serif" font-size="28" fill="#cc0000" font-weight="bold">real world</text>
    <text x="374" y="175" text-anchor="middle" font-family="Georgia,serif" font-size="26" fill="#cc0000" transform="rotate(11,374,175)">passive</text>
    <text x="374" y="330" text-anchor="middle" font-family="Georgia,serif" font-size="22" fill="#cc0000" transform="rotate(-9,374,330)">miniaturize</text>
    <text x="250" y="400" text-anchor="middle" font-family="Georgia,serif" font-size="26" fill="#cc0000" transform="rotate(3,250,400)">design for children</text>
    <text x="126" y="330" text-anchor="middle" font-family="Georgia,serif" font-size="22" fill="#cc0000" transform="rotate(9,126,330)">physical</text>
    <text x="126" y="175" text-anchor="middle" font-family="Georgia,serif" font-size="22" fill="#cc0000" transform="rotate(-11,126,175)">grasp</text>
    <!-- Support words (gray) -->
    <text x="250" y="60" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="#777">embodied interaction · body ownership</text>
    <text x="432" y="255" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#bbb" transform="rotate(88,432,255)">VR illusion</text>
    <text x="68" y="255" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#bbb" transform="rotate(-88,68,255)">exoskeleton</text>
    <text x="250" y="452" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#777">size illusion · wearable · passive</text>
    <text x="396" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#aaa" transform="rotate(28,396,118)">social bias</text>
    <text x="104" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#aaa" transform="rotate(-28,104,118)">VR only</text>
    <text x="396" y="385" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#aaa" transform="rotate(-25,396,385)">ergonomics</text>
    <text x="104" y="385" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#aaa" transform="rotate(25,104,385)">toy trumpet</text>
  </g>
  <text font-family="Arial,sans-serif" font-size="10" fill="#cccccc" letter-spacing="3">
    <textPath href="#arc">UIST 2020 BEST PAPER  ·  PASSIVE EXOSKELETON  ·  EMBODIMENT  ·  MINIATURIZED GRASP  ·  CHILDREN  ·  WEARABLE  ·</textPath>
  </text>
