<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <rect width="600" height="300" fill="#fafafa"/>

  <!-- Hero phrase -->
  <text x="300" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="40" fill="#1a1a1a" font-weight="bold" letter-spacing="-1">TRAINED TO SEE</text>

  <!-- Motivating question -->
  <text x="300" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#cc0000" font-style="italic">Does clinical expertise change where you look when evaluating gait?</text>

  <line x1="160" y1="90" x2="440" y2="90" stroke="#e8e8e8" stroke-width="1"/>

  <!-- Left cluster: novice (gray) -->
  <text x="95" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#cccccc" font-weight="bold">novice</text>
  <text x="78" y="158" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#d8d8d8">legs</text>
  <text x="108" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#e2e2e2">78% of fixation time</text>
  <text x="85" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#e2e2e2">lower limb</text>
  <text x="108" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e8e8e8">obvious motion</text>

  <!-- Center -->
  <text x="300" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#bbbbbb" font-style="italic">point-light walker</text>
  <text x="300" y="178" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#bbbbbb" font-style="italic">biological motion</text>

  <!-- Right cluster: PT student (red) -->
  <text x="490" y="122" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#cc0000" font-weight="bold">PT student</text>
  <text x="476" y="150" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#cc0000">pelvis</text>
  <text x="516" y="175" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#cc0000">shoulder</text>
  <text x="490" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#dd4444">21%  ·  21%</text>
  <text x="506" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#dd4444">proximal · diagnostic</text>

  <line x1="30" y1="250" x2="570" y2="250" stroke="#eeeeee" stroke-width="1"/>
  <text x="300" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#cccccc" letter-spacing="2">GAIT DIAGNOSIS  ·  PCA  ·  EXPERTISE  ·  ICOPA 2019</text>
</svg>
