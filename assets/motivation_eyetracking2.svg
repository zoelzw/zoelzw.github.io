<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <rect width="500" height="500" fill="#ffffff"/>
  <defs>
    <clipPath id="c"><circle cx="250" cy="250" r="238"/></clipPath>
    <path id="arc" d="M250,14 a236,236 0 1,1 -0.1,0"/>
  </defs>
  <circle cx="250" cy="250" r="238" fill="#fafafa" stroke="#eeeeee" stroke-width="1.5"/>
  <g clip-path="url(#c)">
    <!-- Watermark -->
    <text x="250" y="286" text-anchor="middle" font-family="Georgia,serif" font-size="70" fill="#f0f0f0" font-weight="bold" letter-spacing="-2">EXPERTISE</text>
    <!-- Hero -->
    <text x="250" y="234" text-anchor="middle" font-family="Georgia,serif" font-size="34" fill="#cc0000" font-weight="bold" transform="rotate(-3,250,234)">trained to see</text>
    <!-- Impact words (red — what PTs see) -->
    <text x="250" y="118" text-anchor="middle" font-family="Georgia,serif" font-size="32" fill="#cc0000" font-weight="bold">pelvis</text>
    <text x="374" y="174" text-anchor="middle" font-family="Georgia,serif" font-size="28" fill="#cc0000" transform="rotate(11,374,174)">shoulder</text>
    <text x="376" y="330" text-anchor="middle" font-family="Georgia,serif" font-size="22" fill="#cc0000" transform="rotate(-9,376,330)">diagnosis</text>
    <text x="250" y="398" text-anchor="middle" font-family="Georgia,serif" font-size="24" fill="#cc0000" transform="rotate(3,250,398)">PT student</text>
    <text x="124" y="330" text-anchor="middle" font-family="Georgia,serif" font-size="20" fill="#cc0000" transform="rotate(9,124,330)">proximal</text>
    <text x="124" y="174" text-anchor="middle" font-family="Georgia,serif" font-size="22" fill="#cc0000" transform="rotate(-12,124,174)">clinical eye</text>
    <!-- Support words (gray — what novices see) -->
    <text x="250" y="60" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="#777">gait evaluation · diagnosis</text>
    <text x="432" y="255" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#bbb" transform="rotate(88,432,255)">legs 78%</text>
    <text x="68" y="255" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#bbb" transform="rotate(-88,68,255)">novice</text>
    <text x="250" y="452" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#777">point-light walker · biological motion</text>
    <text x="396" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#aaa" transform="rotate(28,396,118)">21% · 21%</text>
    <text x="104" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#aaa" transform="rotate(-28,104,118)">lower limb</text>
    <text x="396" y="385" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#aaa" transform="rotate(-25,396,385)">observation</text>
    <text x="104" y="385" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#aaa" transform="rotate(25,104,385)">heatmap</text>
  </g>
  <text font-family="Arial,sans-serif" font-size="10" fill="#cccccc" letter-spacing="3">
    <textPath href="#arc">ICOPA 2019  ·  PRINCIPAL COMPONENT ANALYSIS  ·  GAIT DIAGNOSIS  ·  PHYSICAL THERAPY  ·  EYE TRACKING  ·  PCA  ·</textPath>
  </text>
</svg>
