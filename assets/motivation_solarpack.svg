<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300">
  <rect width="600" height="300" fill="#fafafa"/>

  <!-- Hero phrase -->
  <text x="300" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="40" fill="#1a1a1a" font-weight="bold" letter-spacing="-1">SOLAR FOR ALL</text>

  <!-- Motivating question -->
  <text x="300" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#cc0000" font-style="italic">Can a solar vehicle be competitive on the track and practical off it?</text>

  <line x1="160" y1="90" x2="440" y2="90" stroke="#e8e8e8" stroke-width="1"/>

  <!-- Left cluster: existing solar racers (gray) -->
  <text x="95" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="19" fill="#cccccc" font-weight="bold">typical racer</text>
  <text x="80" y="158" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#d8d8d8">1 occupant</text>
  <text x="110" y="183" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#ddd">track only</text>
  <text x="84" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#e2e2e2">competition only</text>
  <text x="108" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e8e8e8">aerodynamic · narrow</text>

  <!-- Center bridge -->
  <text x="300" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#bbbbbb" font-style="italic">SolarPack vision</text>
  <text x="300" y="179" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#bbbbbb" font-style="italic">NC State · first team</text>

  <!-- Right cluster: SolarPack (red) -->
  <text x="490" y="125" text-anchor="middle" font-family="Georgia, serif" font-size="22" fill="#cc0000" font-weight="bold">4 occupants</text>
  <text x="508" y="152" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#cc0000">road-ready</text>
  <text x="476" y="177" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#cc0000">practical</text>
  <text x="510" y="201" text-anchor="middle" font-family="Georgia, serif" font-size="15" fill="#dd4444">everyday solar</text>
  <text x="484" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#dd4444">compete  ·  commute  ·  sustain</text>

  <line x1="30" y1="250" x2="570" y2="250" stroke="#eeeeee" stroke-width="1"/>
  <text x="300" y="272" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#cccccc" letter-spacing="2">SOLAR ENERGY  ·  BMS  ·  PCB  ·  FSGP 2017</text>
</svg>
