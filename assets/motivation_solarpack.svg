<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <rect width="500" height="500" fill="#ffffff"/>
  <defs>
    <clipPath id="c"><circle cx="250" cy="250" r="238"/></clipPath>
    <path id="arc" d="M250,14 a236,236 0 1,1 -0.1,0"/>
  </defs>
  <circle cx="250" cy="250" r="238" fill="#fafafa" stroke="#eeeeee" stroke-width="1.5"/>
  <g clip-path="url(#c)">
    <!-- Watermark -->
    <text x="250" y="296" text-anchor="middle" font-family="Georgia,serif" font-size="110" fill="#f0f0f0" font-weight="bold" letter-spacing="-3">SOLAR</text>
    <!-- Hero -->
    <text x="250" y="228" text-anchor="middle" font-family="Georgia,serif" font-size="36" fill="#cc0000" font-weight="bold" transform="rotate(-4,250,228)">solar for all</text>
    <!-- Impact words (red) -->
    <text x="250" y="115" text-anchor="middle" font-family="Georgia,serif" font-size="30" fill="#cc0000" font-weight="bold">4 occupants</text>
    <text x="376" y="174" text-anchor="middle" font-family="Georgia,serif" font-size="26" fill="#cc0000" transform="rotate(11,376,174)">compete</text>
    <text x="376" y="330" text-anchor="middle" font-family="Georgia,serif" font-size="24" fill="#cc0000" transform="rotate(-9,376,330)">commute</text>
    <text x="250" y="400" text-anchor="middle" font-family="Georgia,serif" font-size="26" fill="#cc0000" transform="rotate(3,250,400)">road-ready</text>
    <text x="124" y="330" text-anchor="middle" font-family="Georgia,serif" font-size="22" fill="#cc0000" transform="rotate(9,124,330)">practical</text>
    <text x="124" y="174" text-anchor="middle" font-family="Georgia,serif" font-size="22" fill="#cc0000" transform="rotate(-11,124,174)">sustainable</text>
    <!-- Support words (gray) -->
    <text x="250" y="60" text-anchor="middle" font-family="Georgia,serif" font-size="15" fill="#777">Formula Sun Grand Prix · NC State</text>
    <text x="432" y="255" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#bbb" transform="rotate(88,432,255)">1 occupant</text>
    <text x="68" y="255" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#bbb" transform="rotate(-88,68,255)">track only</text>
    <text x="250" y="452" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#777">BMS · CAN bus · PCB design</text>
    <text x="396" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#aaa" transform="rotate(28,396,118)">aerodynamic</text>
    <text x="104" y="118" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#aaa" transform="rotate(-28,104,118)">competition</text>
    <text x="396" y="385" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#aaa" transform="rotate(-25,396,385)">solar panels</text>
    <text x="104" y="385" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#aaa" transform="rotate(25,104,385)">ASC qualifier</text>
  </g>
  <text font-family="Arial,sans-serif" font-size="10" fill="#cccccc" letter-spacing="3">
    <textPath href="#arc">FSGP 2017  ·  AMERICAN SOLAR CHALLENGE  ·  NC STATE  ·  BATTERY MANAGEMENT  ·  SOLAR ENERGY  ·  WELDING  ·</textPath>
  </text>
</svg>
